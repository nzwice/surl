syntax = "proto3";

package surl.v1;
option go_package = "github.com/nzwice/surl/api/v1/surl";

import "google/protobuf/timestamp.proto";

message ShortenRestrictedUrlRequest {
  string                             original_url = 1;
  optional string                    alias        = 2;
}

message ShortenRetristedUrlResponse {
  string short_code = 1;
  string short_url = 2;
}

service RestrictedShortenService {
  rpc ShortenRestrictedUrl(ShortenRestrictedUrlRequest) returns (ShortenRetristedUrlResponse) {}
}
